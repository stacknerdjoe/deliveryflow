version: '3.8'

services:

  # ─── Message Broker ───────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # RabbitMQ management UI at http://localhost:15672
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Databases ────────────────────────────────────────────────────
  order-db:
    image: postgres:15-alpine
    container_name: order-db
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - order-db-data:/var/lib/postgresql/data

  driver-db:
    image: postgres:15-alpine
    container_name: driver-db
    environment:
      POSTGRES_DB: driverdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - driver-db-data:/var/lib/postgresql/data

  tracking-db:
    image: postgres:15-alpine
    container_name: tracking-db
    environment:
      POSTGRES_DB: trackingdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - tracking-db-data:/var/lib/postgresql/data

  # ─── Services ─────────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      JWT_SECRET: deliveryflow-secret-key-for-jwt-signing-must-be-256-bits-long-xx

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "8081:8081"
    depends_on:
      rabbitmq:
        condition: service_healthy
      order-db:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://order-db:5432/orderdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq

  driver-service:
    build: ./driver-service
    container_name: driver-service
    ports:
      - "8082:8082"
    depends_on:
      rabbitmq:
        condition: service_healthy
      driver-db:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://driver-db:5432/driverdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq

  tracking-service:
    build: ./tracking-service
    container_name: tracking-service
    ports:
      - "8083:8083"
    depends_on:
      rabbitmq:
        condition: service_healthy
      tracking-db:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://tracking-db:5432/trackingdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_RABBITMQ_HOST: rabbitmq

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "8084:8084"
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq

volumes:
  order-db-data:
  driver-db-data:
  tracking-db-data:
