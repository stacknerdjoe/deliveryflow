server:
  port: 8082

spring:
  application:
    name: driver-service
  datasource:
    url: jdbc:postgresql://driver-db:5432/driverdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

rabbitmq:
  exchange: deliveryflow.exchange
  queues:
    order-assigned: order.assigned
  routing-keys:
    order-assigned: order.assigned
