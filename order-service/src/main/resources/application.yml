server:
  port: 8081

spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://order-db:5432/orderdb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  rabbitmq:
    host: rabbitmq
    port: 5672
    username: guest
    password: guest

jwt:
  secret: deliveryflow-secret-key-for-jwt-signing-must-be-256-bits-long-xx

rabbitmq:
  exchange: deliveryflow.exchange
  queues:
    order-created: order.created
    order-assigned: order.assigned
  routing-keys:
    order-created: order.created
    order-assigned: order.assigned
